<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive — Karen Lu</title>
    <meta name="description" content="A collection of interactive installations and generative works exploring the relationship between humans, technology, and nature.">

    <!-- Open Graph -->
    <meta property="og:title" content="Archive — Karen Lu">
    <meta property="og:description" content="Interactive installations and generative works by Karen Lu.">
    <meta property="og:image" content="images/work/wave.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://你的網域/archive.html">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Archive — Karen Lu">
    <meta name="twitter:description" content="Interactive installations and generative works by Karen Lu.">
    <meta name="twitter:image" content="images/work/wave.png">

    <link rel="canonical" href="https://你的網域/archive.html">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-slot" style="min-height:81px;"></div>

    <main class="portfolio-container">
        <section id="projects" class="portfolio-section archive-section">

            <div class="archive-sticky-header">
                <div class="archive-hero-visual" aria-hidden="true">
                    <img src="images/work/wave.png" alt="">
                </div>

                <div class="section-intro">
                    <h2 class="section-title">Archive</h2>
                    <p class="section-tagline">A collection of interactive installations and generative works exploring the relationship between humans, technology, and nature.</p>
                </div>

                <div class="search-wrapper">
                    <label for="archiveSearch" class="sr-only">Search projects</label>
                    <input type="text" id="archiveSearch" placeholder="Search projects or tools... (e.g. Unity, GLSL)" aria-label="Search projects by name or tool">
                    <span class="search-icon" aria-hidden="true">⌕</span>
                </div>

                <div class="archive-toolbar">
                    <div class="filter-pills-container">
                        <button class="filter-tag active" data-filter="all" type="button">ALL</button>
                        <button class="filter-tag" data-filter="engine-3d" type="button">ENGINE & 3D</button>
                        <button class="filter-tag" data-filter="graphics-shader" type="button">GRAPHICS & SHADER</button>
                        <button class="filter-tag" data-filter="interactive-system" type="button">INTERACTIVE SYSTEMS</button>
                    </div>

                    <span class="showing-count" id="showingCount"></span>

                    <div class="sort-control">
                        <span class="sort-label">SORT BY</span>
                        <div class="custom-select" id="sortSelect">
                            <button class="select-trigger" aria-haspopup="listbox" aria-expanded="false">
                                <span class="select-value">LATEST</span>
                                <span class="select-chevron">▾</span>
                            </button>
                            <ul class="select-dropdown" role="listbox">
                                <li class="select-option active" data-value="latest" role="option">LATEST</li>
                                <li class="select-option" data-value="oldest" role="option">OLDEST</li>
                                <li class="select-option" data-value="az" role="option">A — Z</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="archive-list"></div>

            

        </section>
    </main>

    <button class="floating-top-btn" id="floatingTopBtn" aria-label="Back to top">↑</button>
    <div class="footer-slot"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
