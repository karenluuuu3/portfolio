<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive — Karen Lu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-slot"></div>

    <main class="portfolio-container">
        <section id="projects" class="portfolio-section archive-section">

            <div class="archive-sticky-header">
                <div class="archive-hero-visual" aria-hidden="true">
                    <img src="images/work/wave.png" alt="">
                </div>

                <div class="section-intro">
                    <h2 class="section-title">Archive</h2>
                    <p class="section-tagline">A collection of interactive installations and generative works exploring the relationship between humans, technology, and nature.</p>
                </div>

                <div class="search-wrapper">
                    <input type="text" id="archiveSearch" placeholder="Search projects or tools... (e.g. Unity, GLSL)">
                    <span class="search-icon">⌕</span>
                </div>

                <div class="archive-toolbar">
                    <div class="filter-pills-container">
                        <span class="filter-tag active" data-filter="all">ALL</span>
                        <span class="filter-tag" data-filter="engine-3d">ENGINE & 3D</span>
                        <span class="filter-tag" data-filter="graphics-shader">GRAPHICS & SHADER</span>
                        <span class="filter-tag" data-filter="interactive-system">INTERACTIVE SYSTEMS</span>
                    </div>

                    <div class="sort-control">
                        <span class="sort-label">SORT BY</span>
                        <div class="custom-select" id="sortSelect">
                            <button class="select-trigger" aria-haspopup="listbox" aria-expanded="false">
                                <span class="select-value">LATEST</span>
                                <span class="select-chevron">▾</span>
                            </button>
                            <ul class="select-dropdown" role="listbox">
                                <li class="select-option active" data-value="latest" role="option">LATEST</li>
                                <li class="select-option" data-value="oldest" role="option">OLDEST</li>
                                <li class="select-option" data-value="az" role="option">A — Z</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <div class="archive-list"></div>

            <button class="floating-top-btn" id="floatingTopBtn" aria-label="Back to top">↑</button>

            <div class="footer-slot"></div>

        </section>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
